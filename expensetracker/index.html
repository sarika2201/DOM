<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <div class="expensetracker">
        <h1>Expense Tracker</h1>
        <p>Available Balance:  ₹<span id="balance">45000</span></p>
    <form id="expense-form">
        <input
        type="text"
        id="expenseName"
        placeholder="Expense Name"
    >
    <input
    type="number"
    id="expenseAmount"
    placeholder="Amount"
    >
    <button>Add Expense</button>
    </form>
    <h2>Total expense: ₹<span id="total">0</span></h2>

<ul id="expenseList">

</ul>
</div>
    <script src="script.js"></script>
</body>
