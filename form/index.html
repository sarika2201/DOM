<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Task Title</h1>
        <div class="task">
            <div class="input">
                <input type="text" id="task-input" placeholder="Type...">
            </div>
            <div>
                <button id="submit-btn">Submit</button>
            </div>
        </div>
        <div class="boxes">
            <div class="box" data-color="red">Red</div>
            <div class="box" data-color="blue">Blue</div>
            <div class="box" data-color="aqua">Aqua</div>
            <div class="box" data-color="pink">Pink</div>
        </div>

        <div class="output">
            <h3> You typed: </h3>
            <p id="typed-text"></p>
        </div>

    </div>


    <script src="script.js"></script>
</body>
</html>
